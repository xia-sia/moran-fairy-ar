<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>사월의 부귀, 개화 — AR</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/ar.css" />
</head>
<body>

  <!-- 카메라 + AR 렌더 -->
  <div id="ar-container"></div>

  <!-- UI 레이어 -->
  <div id="ui">

    <!-- 1) 시작 화면 -->
    <div id="screen-start" class="screen active">
      <div class="start-box">
        <div class="start-flowers">
          <span class="sf pink"></span>
          <span class="sf orange"></span>
          <span class="sf ivory"></span>
        </div>
        <p class="start-title">사월의 부귀, 개화</p>
        <div class="start-line"></div>
        <p class="start-desc">민화 속 요정을 찾아 잡아보세요</p>
        <button id="btn-start" class="btn-main">시작하기</button>
      </div>
    </div>

    <!-- 2) 스캔 안내 -->
    <div id="screen-scan" class="screen">
      <div class="scan-frame">
        <span class="c tl"></span><span class="c tr"></span>
        <span class="c bl"></span><span class="c br"></span>
      </div>
      <p class="scan-text">민화에 카메라를 비춰주세요</p>
      <div class="dots"><span></span><span></span><span></span></div>
    </div>

    <!-- 3) 소환 -->
    <div id="screen-found" class="screen">
      <p class="found-text">요정이 깨어납니다...</p>
    </div>

    <!-- 4) 탐색 -->
    <div id="screen-hunt" class="screen">
      <div id="counter">
        <span id="d0" class="dot" style="--c:#E07A7A"></span>
        <span id="d1" class="dot" style="--c:#E0933A"></span>
        <span id="d2" class="dot" style="--c:#C8A96E"></span>
      </div>
      <div id="h0" class="hint"><div class="harrow"></div><span class="hdist"></span></div>
      <div id="h1" class="hint"><div class="harrow"></div><span class="hdist"></span></div>
      <div id="h2" class="hint"><div class="harrow"></div><span class="hdist"></span></div>
      <p class="hunt-tip">요정을 찾아 직접 터치하세요</p>
    </div>

    <!-- 5) 완료 -->
    <div id="screen-done" class="screen">
      <div class="done-box">
        <div class="done-flowers">
          <span class="sf pink"></span>
          <span class="sf orange"></span>
          <span class="sf ivory"></span>
        </div>
        <p class="done-words">
          <span id="w0">부귀</span>
          <span class="sep">·</span>
          <span id="w1">영화</span>
          <span class="sep">·</span>
          <span id="w2">사랑</span>
        </p>
        <p class="done-sub">모든 요정을 잡았습니다</p>
        <button class="btn-main" onclick="location.href='index.html'">처음으로</button>
      </div>
    </div>

    <!-- 텍스트 이펙트 -->
    <div id="fx"></div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"></script>
  <script src="js/fairy-ar.js"></script>
</body>
</html>
